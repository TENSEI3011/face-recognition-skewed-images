<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Face Recognition UAV System</title>
  <meta name="description" content="Secure login for the UAV Face Recognition surveillance system.">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { justify-content: center; align-items: center; background: var(--bg); }
    .login-wrap { width: 100%; max-width: 420px; padding: 16px; }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--panel-line);
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before, .login-card::after,
    .login-card .bl, .login-card .br {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      border: 1.5px solid var(--phosphor-dim);
    }
    .login-card::before { top: -1px; left: -1px;  border-right: none; border-bottom: none; }
    .login-card::after  { top: -1px; right: -1px; border-left:  none; border-bottom: none; }
    .login-card .bl     { bottom: -1px; left: -1px;  border-right: none; border-top: none; }
    .login-card .br     { bottom: -1px; right: -1px; border-left: none;  border-top: none; }

    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-icon {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2rem;
      color: var(--phosphor);
      margin-bottom: 14px;
      display: block;
      letter-spacing: 0.06em;
    }
    .login-logo h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--text);
    }
    .login-logo p { font-family: 'IBM Plex Mono', monospace; font-size: .68rem; color: var(--dim); margin-top: 4px; }
    .login-badge {
      display: inline-block;
      border: 1px solid var(--phosphor-dim);
      color: var(--phosphor);
      font-family: 'IBM Plex Mono', monospace;
      font-size: .6rem; font-weight: 700;
      padding: 2px 8px; letter-spacing: .08em;
      text-transform: uppercase; margin-top: 8px;
    }
    #login-error {
      background: rgba(255,107,94,.08);
      border: 1px solid rgba(255,107,94,.4);
      color: var(--red);
      font-family: 'IBM Plex Mono', monospace;
      font-size: .75rem; padding: 10px 14px;
      margin-bottom: 14px; display: none;
    }
    .login-footer {
      text-align: center; margin-top: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .65rem; color: var(--dim);
    }
    .login-footer strong { color: var(--phosphor); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="bl"></div><div class="br"></div>

    <div class="login-logo">
      <span class="logo-icon">[ FR ]</span>
      <h1>Face Recognition<br>UAV System</h1>
      <p>Drone Surveillance Platform</p>
      <span class="login-badge">DRDO Research</span>
    </div>

    <div id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username"
               autocomplete="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password"
               autocomplete="current-password" placeholder="Enter password" required>
      </div>
      <button class="btn btn-primary w-full btn-lg" type="submit" id="login-btn"
              style="margin-top:8px">
        Sign In →
      </button>
    </form>

    <div class="login-footer">
      Default credentials: <strong>admin</strong> / <strong>admin123</strong>
    </div>
  </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>
